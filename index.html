<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreams Setup — Video Distributor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --gold: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #10b981;
    --error: #ef4444;
    --warn: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    top: -200px;
    right: -200px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 40px;
  }

  /* Header */
  .header {
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-text span {
    color: var(--accent2);
  }

  h1 {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1.1;
    margin-bottom: 10px;
  }

  h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent2), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s ease both;
  }

  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Input group */
  .input-group {
    margin-bottom: 20px;
  }

  .input-group:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }

  label .optional {
    font-weight: 400;
    color: var(--muted);
    font-size: 12px;
    margin-left: 6px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    pointer-events: none;
  }

  input[type="url"], input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px 13px 42px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="url"]:focus, input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
  }

  input::placeholder {
    color: var(--muted);
  }

  /* Platform indicators */
  .platform-badge {
    display: none;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    padding: 6px 10px;
    border-radius: 6px;
    width: fit-content;
  }

  .platform-badge.show { display: flex; }
  .platform-badge.youtube { background: rgba(255,0,0,0.1); color: #ff4444; border: 1px solid rgba(255,0,0,0.2); }
  .platform-badge.tiktok { background: rgba(0,242,234,0.1); color: #00f2ea; border: 1px solid rgba(0,242,234,0.2); }
  .platform-badge.instagram { background: rgba(228,64,95,0.1); color: #e4405f; border: 1px solid rgba(228,64,95,0.2); }

  /* Targets preview */
  .targets {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }

  .targets.show { display: flex; }

  .target-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.25);
    color: var(--accent2);
  }

  .target-chip.manual {
    background: rgba(245,158,11,0.1);
    border-color: rgba(245,158,11,0.25);
    color: var(--gold);
  }

  /* Submit button */
  .btn-submit {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    letter-spacing: -0.3px;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:active { transform: scale(0.99); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-submit .spinner {
    display: none;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .btn-submit.loading .spinner { display: block; }
  .btn-submit.loading .btn-text { display: none; }

  /* Status */
  .status-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-top: 16px;
    animation: fadeUp 0.4s ease both;
  }

  .status-card.show { display: block; }
  .status-card.success { border-color: rgba(16,185,129,0.3); }
  .status-card.error { border-color: rgba(239,68,68,0.3); }

  .status-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .status-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .status-icon.success { background: rgba(16,185,129,0.15); }
  .status-icon.error { background: rgba(239,68,68,0.15); }

  .status-title {
    font-size: 15px;
    font-weight: 700;
  }

  .result-section {
    margin-bottom: 16px;
  }

  .result-section:last-child { margin-bottom: 0; }

  .result-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .platform-result {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .platform-result:last-child { margin-bottom: 0; }

  .platform-result-name {
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .platform-result-content {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }

  .copy-btn:hover { color: var(--text); border-color: var(--accent); }
  .copy-btn.copied { color: var(--success); border-color: var(--success); }

  .folder-path {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent2);
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 32px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    animation: fadeUp 0.6s ease 0.4s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div class="glow"></div>

<div class="container">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🚀</div>
      <div class="logo-text">Dreams <span>Setup</span></div>
    </div>
    <h1>Video <em>Distributor</em></h1>
    <p class="subtitle">// paste a link → AI generates content → distributes everywhere</p>
  </div>

  <!-- Input Card -->
  <div class="card">
    <div class="card-label">01 — Video Source</div>

    <div class="input-group">
      <label>Video URL <span class="optional">YouTube / TikTok / Instagram</span></label>
      <div class="input-wrap">
        <span class="icon">🎬</span>
        <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." oninput="detectPlatform(this.value)">
      </div>
      <div class="platform-badge" id="platformBadge"></div>
      <div class="targets" id="targetsPreview"></div>
    </div>
  </div>

  <!-- Pinterest Card -->
  <div class="card">
    <div class="card-label">02 — Pinterest Product Link</div>
    <div class="input-group">
      <label>Product URL <span class="optional">added to every Pinterest pin</span></label>
      <div class="input-wrap">
        <span class="icon">📌</span>
        <input type="url" id="productUrl" placeholder="https://your-store.com/product/...">
      </div>
    </div>
  </div>

  <!-- Submit -->
  <button class="btn-submit" id="submitBtn" onclick="submitForm()">
    <div class="spinner"></div>
    <span class="btn-text">⚡ Distribute Video</span>
  </button>

  <!-- Status -->
  <div class="status-card" id="statusCard">
    <div class="status-header">
      <div class="status-icon" id="statusIcon"></div>
      <div class="status-title" id="statusTitle"></div>
    </div>
    <div id="statusContent"></div>
  </div>

  <div class="footer">Dreams Setup Video Distributor — Powered by AI 🤖</div>
</div>

<script>
const WEBHOOK_URL = 'https://social-media-agent-jycu.onrender.com/webhook/distribute-video';

const PLATFORM_CONFIG = {
  youtube: {
    label: '▶ YouTube detected',
    cls: 'youtube',
    targets: [
      {name: 'TikTok', manual: true},
      {name: 'Instagram', manual: true},
      {name: 'Pinterest', manual: false},
      {name: 'Facebook', manual: false}
    ]
  },
  instagram: {
    label: '📸 Instagram detected',
    cls: 'instagram',
    targets: [
      {name: 'TikTok', manual: true},
      {name: 'YouTube', manual: false},
      {name: 'Pinterest', manual: false}
    ]
  },
  tiktok: {
    label: '🎵 TikTok detected',
    cls: 'tiktok',
    targets: [
      {name: 'YouTube', manual: false},
      {name: 'Instagram', manual: true},
      {name: 'Pinterest', manual: false},
      {name: 'Facebook', manual: false}
    ]
  }
};

function detectPlatform(url) {
  const badge = document.getElementById('platformBadge');
  const targets = document.getElementById('targetsPreview');

  let platform = null;
  if (url.includes('youtube.com') || url.includes('youtu.be')) platform = 'youtube';
  else if (url.includes('instagram.com')) platform = 'instagram';
  else if (url.includes('tiktok.com')) platform = 'tiktok';

  if (platform) {
    const cfg = PLATFORM_CONFIG[platform];
    badge.className = `platform-badge show ${cfg.cls}`;
    badge.textContent = cfg.label;

    targets.className = 'targets show';
    targets.innerHTML = cfg.targets.map(t =>
      `<span class="target-chip ${t.manual ? 'manual' : ''}">${t.name}${t.manual ? ' 📋' : ' ✓'}</span>`
    ).join('');
  } else {
    badge.className = 'platform-badge';
    targets.className = 'targets';
  }
}

async function submitForm() {
  const videoUrl = document.getElementById('videoUrl').value.trim();
  const productUrl = document.getElementById('productUrl').value.trim();
  const btn = document.getElementById('submitBtn');
  const statusCard = document.getElementById('statusCard');

  if (!videoUrl) {
    showStatus('error', '⚠️ Missing URL', '<p style="font-size:14px;color:var(--muted)">Please enter a video URL first.</p>');
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');
  statusCard.className = 'status-card';

  try {
    const response = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ video_url: videoUrl, product_url: productUrl })
    });

    const data = await response.json();

    if (data.success) {
      let html = '';

      // Folder info
      if (data.folder_name) {
        html += `<div class="result-section">
          <div class="result-label">📁 Google Drive Folder</div>
          <div class="folder-path">Dreams Setup / ${data.folder_name}</div>
        </div>`;
      }

      // Auto platforms
      if (data.auto_platforms && Object.keys(data.auto_platforms).length > 0) {
        html += `<div class="result-section"><div class="result-label">✅ Auto Published</div>`;
        for (const [platform, content] of Object.entries(data.auto_platforms)) {
          html += `<div class="platform-result">
            <div class="platform-result-name">✓ ${platform.toUpperCase()}</div>
            <div class="platform-result-content">${content.title || content.caption || ''}</div>
          </div>`;
        }
        html += `</div>`;
      }

      // Manual platforms
      if (data.manual_platforms && Object.keys(data.manual_platforms).length > 0) {
        html += `<div class="result-section"><div class="result-label">📋 Manual Upload (copy & paste)</div>`;
        for (const [platform, caption] of Object.entries(data.manual_platforms)) {
          const id = `cap_${platform}`;
          html += `<div class="platform-result">
            <div class="platform-result-name">📋 ${platform.toUpperCase()}</div>
            <div class="platform-result-content" id="${id}">${caption}</div>
            <button class="copy-btn" onclick="copyText('${id}', this)">📋 Copy caption</button>
          </div>`;
        }
        html += `</div>`;
      }

      showStatus('success', '🎉 Distribution Complete!', html);
    } else {
      showStatus('error', '❌ Something went wrong', `<p style="font-size:13px;font-family:monospace;color:var(--muted)">${JSON.stringify(data)}</p>`);
    }
  } catch (err) {
    showStatus('error', '❌ Connection Error', `<p style="font-size:13px;color:var(--muted)">Could not reach the server. Make sure n8n is running.<br><br><code style="font-size:11px">${err.message}</code></p>`);
  }

  btn.disabled = false;
  btn.classList.remove('loading');
}

function showStatus(type, title, content) {
  const card = document.getElementById('statusCard');
  const icon = document.getElementById('statusIcon');
  const titleEl = document.getElementById('statusTitle');
  const contentEl = document.getElementById('statusContent');

  card.className = `status-card show ${type}`;
  icon.className = `status-icon ${type}`;
  icon.textContent = type === 'success' ? '✅' : '❌';
  titleEl.textContent = title;
  contentEl.innerHTML = content;

  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyText(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Copy caption';
      btn.classList.remove('copied');
    }, 2000);
  });
}
</script>
</body>
</html>
