<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreams Setup — Content Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --card: #13131f;
  --border: #1a1a2e;
  --accent: #6366f1;
  --accent2: #8b5cf6;
  --gold: #f59e0b;
  --cyan: #06b6d4;
  --text: #e2e8f0;
  --muted: #4a5568;
  --success: #10b981;
  --error: #f87171;
  --youtube: #ff4444;
  --tiktok: #00f2ea;
  --instagram: #e4405f;
  --pinterest: #e60023;
  --facebook: #1877f2;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Animated background */
.bg-grid {
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
  background-size: 32px 32px;
  z-index: 0;
}

.bg-glow {
  position: fixed;
  width: 800px;
  height: 800px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 65%);
  top: -300px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 0;
  pointer-events: none;
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 48px 20px 60px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 48px;
  animation: rise 0.7s ease both;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  border: 1px solid rgba(99,102,241,0.3);
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

h1 {
  font-size: clamp(32px, 6vw, 52px);
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 12px;
}

h1 .highlight {
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.tagline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--muted);
}

/* Section */
.section {
  margin-bottom: 16px;
  animation: rise 0.7s ease both;
}
.section:nth-child(2) { animation-delay: 0.1s; }
.section:nth-child(3) { animation-delay: 0.15s; }
.section:nth-child(4) { animation-delay: 0.2s; }

.section-inner {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
}

.section-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-tag::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.field { margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }

label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 7px;
}

label small {
  font-weight: 400;
  color: var(--muted);
  font-size: 12px;
}

.input-row {
  position: relative;
}

.input-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  pointer-events: none;
}

input[type=url], input[type=text], input[type=password] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 11px 12px 11px 38px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
}

input::placeholder { color: var(--muted); }

/* Platform detector */
.detector {
  display: none;
  margin-top: 10px;
  gap: 8px;
  flex-wrap: wrap;
}
.detector.show { display: flex; }

.det-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.det-badge.yt { background: rgba(255,68,68,0.1); color: var(--youtube); border: 1px solid rgba(255,68,68,0.2); }
.det-badge.tt { background: rgba(0,242,234,0.1); color: var(--tiktok); border: 1px solid rgba(0,242,234,0.2); }
.det-badge.ig { background: rgba(228,64,95,0.1); color: var(--instagram); border: 1px solid rgba(228,64,95,0.2); }

.target-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
}
.chip.auto { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
.chip.manual { background: rgba(245,158,11,0.1); color: var(--gold); border: 1px solid rgba(245,158,11,0.2); }

/* Generate button */
.btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
  letter-spacing: -0.3px;
  animation: rise 0.7s ease 0.25s both;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
}

.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.spinner {
  display: none;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

.btn.loading .spinner { display: block; }
.btn.loading .btn-label { display: none; }

/* Results */
.results {
  display: none;
  margin-top: 16px;
  animation: rise 0.5s ease both;
}
.results.show { display: block; }

.result-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding: 14px 18px;
  background: rgba(16,185,129,0.08);
  border: 1px solid rgba(16,185,129,0.2);
  border-radius: 10px;
}

.result-header-icon { font-size: 18px; }
.result-header-text { font-size: 14px; font-weight: 600; }
.result-header-sub { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

/* Platform cards */
.platform-grid { display: flex; flex-direction: column; gap: 12px; }

.platform-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.platform-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.platform-name {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
}

.platform-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.platform-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
}

.type-auto { background: rgba(16,185,129,0.1); color: var(--success); }
.type-manual { background: rgba(245,158,11,0.1); color: var(--gold); }

.platform-body { padding: 14px 16px; }

.content-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.content-text {
  font-size: 13px;
  line-height: 1.65;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  margin-bottom: 10px;
}

.hashtags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
}

.hashtag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  background: rgba(99,102,241,0.08);
  border: 1px solid rgba(99,102,241,0.15);
  padding: 2px 8px;
  border-radius: 4px;
}

.copy-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
}

.copy-btn:hover { color: var(--text); border-color: var(--accent); }
.copy-btn.ok { color: var(--success); border-color: var(--success); }

/* Error */
.error-box {
  display: none;
  margin-top: 16px;
  padding: 14px 16px;
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 10px;
  font-size: 13px;
  color: var(--error);
}
.error-box.show { display: block; }

/* API key info */
.api-info {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="badge">⚡ Dreams Setup</div>
    <h1>Content <span class="highlight">Generator</span></h1>
    <p class="tagline">// paste link → AI writes captions → copy & post</p>
  </div>

  <!-- Step 1: Video URL -->
  <div class="section">
    <div class="section-inner">
      <div class="section-tag">01 — Video Source</div>
      <div class="field">
        <label>Video URL <small>YouTube / TikTok / Instagram</small></label>
        <div class="input-row">
          <span class="input-icon">🎬</span>
          <input type="url" id="videoUrl" placeholder="https://www.tiktok.com/@..." oninput="onUrlChange(this.value)">
        </div>
        <div class="detector" id="detector"></div>
        <div id="downloadBtn" style="display:none; margin-top:12px;">
          <a id="downloadLink" href="#" target="_blank" style="
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(16,185,129,0.3);
            background: rgba(16,185,129,0.08);
            color: #10b981;
            text-decoration: none;
            transition: all 0.2s;
          " onmouseover="this.style.background='rgba(16,185,129,0.15)'" onmouseout="this.style.background='rgba(16,185,129,0.08)'">
            ⬇️ <span id="downloadText">Download Video</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 2: Product URL -->
  <div class="section">
    <div class="section-inner">
      <div class="section-tag">02 — Pinterest Product</div>
      <div class="field">
        <label>Product URL <small>added to Pinterest pins</small></label>
        <div class="input-row">
          <span class="input-icon">📌</span>
          <input type="url" id="productUrl" placeholder="https://dreamssetup.com/products/...">
        </div>
      </div>
    </div>
  </div>

  <!-- Step 3: API Key -->
  <div class="section">
    <div class="section-inner">
      <div class="section-tag">03 — Gemini API Key</div>
      <div class="field">
        <label>API Key <small>from aistudio.google.com — free</small></label>
        <div class="input-row">
          <span class="input-icon">🔑</span>
          <input type="password" id="apiKey" placeholder="AQ.Ab8RN6K03...">
        </div>
        <div class="api-info">💡 Key is stored only in your browser, never sent anywhere else</div>
      </div>
    </div>
  </div>

  <!-- Generate Button -->
  <button class="btn btn-primary" id="genBtn" onclick="generate()">
    <div class="spinner"></div>
    <span class="btn-label">✨ Generate Content for All Platforms</span>
  </button>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="result-header">
      <div class="result-header-icon">🎉</div>
      <div>
        <div class="result-header-text">Content Generated!</div>
        <div class="result-header-sub" id="resultSub"></div>
      </div>
    </div>
    <div class="platform-grid" id="platformGrid"></div>
  </div>

</div>

<script>
// Save API key in localStorage
const savedKey = localStorage.getItem('gemini_key');
if (savedKey) document.getElementById('apiKey').value = savedKey;

const PLATFORM_MAP = {
  youtube: {
    label: '▶ YouTube detected', cls: 'yt',
    targets: [
      { name: 'TikTok', icon: '🎵', color: '#00f2ea', manual: true },
      { name: 'Instagram', icon: '📸', color: '#e4405f', manual: true },
      { name: 'Pinterest', icon: '📌', color: '#e60023', manual: false },
      { name: 'Facebook', icon: '👥', color: '#1877f2', manual: false }
    ]
  },
  instagram: {
    label: '📸 Instagram detected', cls: 'ig',
    targets: [
      { name: 'TikTok', icon: '🎵', color: '#00f2ea', manual: true },
      { name: 'YouTube', icon: '▶', color: '#ff4444', manual: false },
      { name: 'Pinterest', icon: '📌', color: '#e60023', manual: false }
    ]
  },
  tiktok: {
    label: '🎵 TikTok detected', cls: 'tt',
    targets: [
      { name: 'YouTube', icon: '▶', color: '#ff4444', manual: false },
      { name: 'Instagram', icon: '📸', color: '#e4405f', manual: true },
      { name: 'Pinterest', icon: '📌', color: '#e60023', manual: false },
      { name: 'Facebook', icon: '👥', color: '#1877f2', manual: false }
    ]
  }
};

let currentPlatform = null;
let currentTargets = [];

function detectPlatform(url) {
  if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
  if (url.includes('instagram.com')) return 'instagram';
  if (url.includes('tiktok.com')) return 'tiktok';
  return null;
}

const DOWNLOAD_SITES = {
  tiktok: { url: "https://ssstik.io/en?url=", label: "⬇️ Download from ssstik.io (no watermark)" },
  instagram: { url: "https://snapinsta.app/?url=", label: "⬇️ Download from snapinsta.app" },
  youtube: { url: "https://yt1s.com/en?q=", label: "⬇️ Download from yt1s.com (1080p)" }
};

function onUrlChange(url) {
  const det = document.getElementById('detector');
  currentPlatform = detectPlatform(url);

  if (!currentPlatform) { det.className = 'detector'; return; }

  const cfg = PLATFORM_MAP[currentPlatform];
  currentTargets = cfg.targets;

  let html = `<div class="det-badge ${cfg.cls}">${cfg.label}</div>`;
  html += `<div class="target-chips">`;
  cfg.targets.forEach(t => {
    html += `<span class="chip ${t.manual ? 'manual' : 'auto'}">${t.icon} ${t.name} ${t.manual ? '📋' : '✓'}</span>`;
  });
  html += `</div>`;

  det.innerHTML = html;
  det.className = 'detector show';

  // Download button
  const dl = DOWNLOAD_SITES[currentPlatform];
  const dlBtn = document.getElementById('downloadBtn');
  const dlLink = document.getElementById('downloadLink');
  const dlText = document.getElementById('downloadText');
  if (dl && url && dlBtn) {
    dlLink.href = dl.url + encodeURIComponent(url);
    dlText.textContent = dl.label;
    dlBtn.style.display = 'block';
  }
}

async function generate() {
  const videoUrl = document.getElementById('videoUrl').value.trim();
  const productUrl = document.getElementById('productUrl').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();
  const btn = document.getElementById('genBtn');
  const errorBox = document.getElementById('errorBox');
  const results = document.getElementById('results');

  errorBox.className = 'error-box';
  results.className = 'results';

  if (!videoUrl) return showError('Please enter a video URL first.');
  if (!apiKey) return showError('Please enter your Gemini API key.');
  if (!currentPlatform) return showError('Could not detect platform. Make sure the URL is from YouTube, TikTok, or Instagram.');

  localStorage.setItem('gemini_key', apiKey);

  btn.disabled = true;
  btn.classList.add('loading');

  const targetNames = currentTargets.map(t => t.name).join(', ');

  const prompt = `You are an expert social media marketing manager with 20+ years experience. You work for "Dreams Setup" — a premium electronics and gaming setup store in the Middle East.

Video URL: ${videoUrl}
Source platform: ${currentPlatform}
Target platforms: ${targetNames}
Product URL (for Pinterest): ${productUrl || 'https://dreamssetup.com'}

Generate optimized content for each target platform. Be a professional marketer — make each post unique, engaging, and platform-native.

Respond ONLY with valid JSON, no markdown, no extra text:
{
  "file_name": "short-descriptive-filename-no-extension",
  "platforms": {
    ${currentTargets.map(t => `"${t.name.toLowerCase()}": ${t.name === 'YouTube' ? '{"title": "", "description": "", "hashtags": []}' : t.name === 'Pinterest' ? '{"title": "", "description": "", "hashtags": [], "product_url": "' + (productUrl || '') + '"}' : '{"caption": "", "hashtags": []}'}`).join(',\n    ')}
  }
}

Rules:
- Each platform must have unique content (not copy-paste)
- Use trending hashtags relevant to gaming setups, tech, electronics
- Write in English but make it relatable to Middle East audience
- YouTube: detailed description, 10+ tags
- TikTok: short punchy caption, viral hashtags
- Instagram: engaging caption with emojis, 20-25 hashtags  
- Pinterest: SEO-optimized title and description with product link
- Facebook: conversational tone, 5-10 hashtags`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.8, maxOutputTokens: 2000 }
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'API Error');
    }

    const data = await res.json();
    let text = data.candidates[0].content.parts[0].text;
    text = text.replace(/```json/g, '').replace(/```/g, '').trim();

    let content;
    try { content = JSON.parse(text); }
    catch(e) { throw new Error('Could not parse AI response. Try again.'); }

    showResults(content, currentTargets, productUrl);

  } catch(e) {
    showError(e.message);
  }

  btn.disabled = false;
  btn.classList.remove('loading');
}

function showResults(content, targets, productUrl) {
  const grid = document.getElementById('platformGrid');
  const sub = document.getElementById('resultSub');
  const results = document.getElementById('results');

  sub.textContent = `${targets.length} platforms • ${content.file_name || 'dreams-setup-content'}`;

  let html = '';
  targets.forEach(t => {
    const key = t.name.toLowerCase();
    const pdata = content.platforms?.[key] || {};
    const isManual = t.manual;

    html += `<div class="platform-card">
      <div class="platform-header">
        <div class="platform-name">
          <div class="platform-dot" style="background:${t.color}"></div>
          ${t.icon} ${t.name}
        </div>
        <span class="platform-type ${isManual ? 'type-manual' : 'type-auto'}">${isManual ? '📋 Manual' : '✓ Auto'}</span>
      </div>
      <div class="platform-body">`;

    if (t.name === 'YouTube') {
      const fullText = `${pdata.title || ''}\n\n${pdata.description || ''}`;
      html += `<div class="content-label">Title</div>
        <div class="content-text">${pdata.title || ''}</div>
        <div class="content-label">Description</div>
        <div class="content-text">${pdata.description || ''}</div>`;
      if (pdata.hashtags?.length) {
        html += `<div class="hashtags">${pdata.hashtags.map(h => `<span class="hashtag">#${h}</span>`).join('')}</div>`;
      }
      html += `<button class="copy-btn" onclick="copyContent(\`${escapeTemplate(fullText + '\n\n' + (pdata.hashtags||[]).map(h=>'#'+h).join(' '))}\`, this)">📋 Copy all</button>`;
    } else if (t.name === 'Pinterest') {
      const fullText = `${pdata.title || ''}\n\n${pdata.description || ''}\n\n🔗 ${productUrl || pdata.product_url || ''}`;
      html += `<div class="content-label">Title</div>
        <div class="content-text">${pdata.title || ''}</div>
        <div class="content-label">Description + Link</div>
        <div class="content-text">${pdata.description || ''}\n\n🔗 ${productUrl || pdata.product_url || ''}</div>`;
      if (pdata.hashtags?.length) {
        html += `<div class="hashtags">${pdata.hashtags.map(h => `<span class="hashtag">#${h}</span>`).join('')}</div>`;
      }
      html += `<button class="copy-btn" onclick="copyContent(\`${escapeTemplate(fullText)}\`, this)">📋 Copy all</button>`;
    } else {
      const fullText = `${pdata.caption || ''}\n\n${(pdata.hashtags||[]).map(h=>'#'+h).join(' ')}`;
      html += `<div class="content-label">Caption</div>
        <div class="content-text">${pdata.caption || ''}</div>`;
      if (pdata.hashtags?.length) {
        html += `<div class="hashtags">${pdata.hashtags.map(h => `<span class="hashtag">#${h}</span>`).join('')}</div>`;
      }
      html += `<button class="copy-btn" onclick="copyContent(\`${escapeTemplate(fullText)}\`, this)">📋 Copy caption + hashtags</button>`;
    }

    html += `</div></div>`;
  });

  grid.innerHTML = html;
  results.className = 'results show';
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escapeTemplate(str) {
  return (str || '').replace(/`/g, "'").replace(/\$/g, '\\$');
}

function copyContent(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('ok');
    setTimeout(() => {
      btn.textContent = btn.textContent.includes('all') ? '📋 Copy all' : '📋 Copy caption + hashtags';
      btn.classList.remove('ok');
    }, 2000);
  });
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '⚠️ ' + msg;
  box.className = 'error-box show';
}
</script>
</body>
</html>
